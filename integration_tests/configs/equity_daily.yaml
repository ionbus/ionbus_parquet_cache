# Equity Daily Data - Integration Test Configuration
# Source: Generated fake equity daily bars

cache_dir: ../../../parquet_test_data/test_caches

datasets:
  md.equity_daily:
    description: Daily equity OHLC data (synthetic)
    date_col: date
    date_partition: year
    partition_columns:
      - first_letter
    sort_columns:
      - ticker
      - date

    # Read from generated fake bars
    source_class_name: HiveParquetSource
    source_init_args:
      path: "../../../parquet_test_data/fake_bars/daily"
